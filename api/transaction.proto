syntax = "proto3";

package ch.kinsushi.lab;

message Transaction {
  string transaction_id = 1;
  string client_id = 2;
  string account_id = 3;
  double amount = 4;
  string currency = 5;
  string timestamp = 6;
  string channel = 7;
}

message RiskPrediction {
  string request_id = 1;
  string transaction_id = 2;
  double risk_score = 3;
  string decision = 4;
}
