name: Public safety check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  public-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run public safety check
        run: python tools/public_safety_check.py
